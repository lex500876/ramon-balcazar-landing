<div class="premium-calc">

  <h2>Simula tu financiamiento</h2>

  <div class="circle">
    <div class="inner">
      <span id="monthly">$0</span>
      <p>Mensual</p>
    </div>
  </div>

  <div class="inputs">
    <input type="number" id="price" placeholder="Valor del lote ($)">
    <input type="number" id="down" placeholder="Entrada ($)">
    <input type="number" id="years" placeholder="Años">
  </div>

  <button onclick="calculatePremium()">Calcular</button>

  <div class="details">
    <p><strong>Entrada:</strong> <span id="entrada">$0</span></p>
    <p><strong>Monto financiado:</strong> <span id="loan">$0</span></p>
  </div>

  <a id="ctaPremium" class="cta" target="_blank">
    Hablar con asesor ahora
  </a>

</div>

<style>
.premium-calc {
  background: white;
  padding: 25px;
  border-radius: 20px;
  max-width: 420px;
  margin: auto;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* CÍRCULO */
.circle {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  margin: 20px auto;
  background: conic-gradient(#22c55e 0%, #e5e7eb 0%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.inner {
  background: white;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.inner span {
  font-size: 28px;
  font-weight: bold;
  color: #16a34a;
}

/* INPUTS */
.inputs {
  display: grid;
  gap: 10px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* BOTÓN */
button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: #0f172a;
  color: white;
  border-radius: 10px;
  border: none;
}

/* DETALLES */
.details {
  margin-top: 15px;
  text-align: left;
}

/* CTA */
.cta {
  display: block;
  margin-top: 20px;
  padding: 14px;
  background: #25D366;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}
</style>

<script>
function calculatePremium() {

  let price = parseFloat(document.getElementById('price').value) || 0;
  let down = parseFloat(document.getElementById('down').value) || 0;
  let years = parseFloat(document.getElementById('years').value) || 0;

  let rate = 0.075 / 12;
  let loan = price - down;
  let payments = years * 12;

  let monthly = (loan * rate) / (1 - Math.pow(1 + rate, -payments));
  if (!isFinite(monthly)) monthly = 0;

  monthly = monthly.toFixed(2);

  document.getElementById('monthly').innerText = "$" + monthly;
  document.getElementById('entrada').innerText = "$" + down;
  document.getElementById('loan').innerText = "$" + loan;

  // Animación círculo
  let percent = Math.min((monthly / 1000) * 100, 100);
  document.querySelector('.circle').style.background =
    `conic-gradient(#22c55e ${percent}%, #e5e7eb ${percent}%)`;

  // WhatsApp dinámico
  let link = "https://wa.me/593XXXXXXXXX?text=Hola,%20puedo%20pagar%20aprox%20$" + monthly + "%20mensuales%20y%20quiero%20información";
  document.getElementById('ctaPremium').href = link;
}
</script>
