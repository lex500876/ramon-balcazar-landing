<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Financiamiento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fb;
}

.container {
  max-width: 950px;
  margin: 40px auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}

.result-box, .form-box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.result-box {
  text-align: center;
}

.circle {
  width: 220px;
  height: 220px;
  margin: auto;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.inner {
  background: white;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.inner span {
  font-size: 34px;
  font-weight: bold;
}

.breakdown {
  margin-top: 20px;
  text-align: left;
}

.breakdown p {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

label {
  font-size: 14px;
  font-weight: bold;
}

.grid {
  display: grid;
  gap: 10px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  margin-top: 15px;
  padding: 12px;
  border: none;
  background: #0f172a;
  color: white;
  border-radius: 10px;
  width: 100%;
  cursor: pointer;
}

.cta {
  margin-top: 15px;
  display: block;
  padding: 12px;
  background: #25D366;
  color: white;
  text-align: center;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<!-- RESULTADO -->
<div class="result-box">
  <h2>Pago mensual</h2>

  <div class="circle" id="circle">
    <div class="inner">
      <span id="monthly">$0</span>
      <p>Mensual</p>
    </div>
  </div>

  <div class="breakdown">
    <p><span style="color:#ef476f;">● Entrada</span><span id="down">$0</span></p>
    <p><span style="color:#118ab2;">● Financiamiento</span><span id="loan">$0</span></p>
    <p><span style="color:#ffd166;">● Cuota mensual</span><span id="mortgage">$0</span></p>
    <p><span style="color:#06d6a0;">● Interés total</span><span id="interest">$0</span></p>
  </div>
</div>

<!-- FORMULARIO -->
<div class="form-box">
  <h2>Simulación</h2>

  <div class="grid">

    <label>Valor del lote ($)</label>
    <input type="number" id="price">

    <label>Porcentaje de entrada (%)</label>
    <input type="number" id="downPercent" value="30">

    <label>Tasa de interés anual (%)</label>
    <input type="number" id="rate" value="8.5">

    <label>Plazo (años)</label>
    <input type="number" id="years">

  </div>

  <button onclick="calculate()">Calcular</button>

  <a id="cta" class="cta" target="_blank">
    Solicitar información
  </a>
</div>

</div>

<script>

function formatMoney(v){
  return "$" + v.toLocaleString("en-US", {maximumFractionDigits:0});
}

function calculate(){

  let price = parseFloat(document.getElementById('price').value) || 0;
  let dp = parseFloat(document.getElementById('downPercent').value) || 30;
  let rateAnnual = parseFloat(document.getElementById('rate').value) || 8.5;
  let years = parseFloat(document.getElementById('years').value) || 0;

  let down = price * (dp/100);
  let loan = price - down;

  let rate = (rateAnnual/100)/12;
  let n = years * 12;

  let mortgage = (loan * rate) / (1 - Math.pow(1 + rate, -n));
  if(!isFinite(mortgage)) mortgage = 0;

  let totalPaid = mortgage * n;
  let interest = totalPaid - loan;

  // Mostrar
  monthly.innerText = formatMoney(mortgage);
  downEl.innerText = formatMoney(down);
  loanEl.innerText = formatMoney(loan);
  mortgageEl.innerText = formatMoney(mortgage);
  interestEl.innerText = formatMoney(interest);

  // Rueda visual (estilo competencia mejorado)
  let entrada = (down/price)*60 || 0;
  let prestamo = (loan/price)*60 || 0;
  let cuota = 25;
  let interesVis = 15;

  circle.style.background = `
    conic-gradient(
      #ef476f 0% ${entrada}%,
      #118ab2 ${entrada}% ${entrada+prestamo}%,
      #ffd166 ${entrada+prestamo}% ${entrada+prestamo+cuota}%,
      #06d6a0 ${entrada+prestamo+cuota}% 100%
    )
  `;

  // WhatsApp
  let msg = `
Hola, quiero información:

Valor del lote: ${formatMoney(price)}
Entrada: ${formatMoney(down)}
Financiamiento: ${formatMoney(loan)}

Plazo: ${years} años
Tasa: ${rateAnnual}%

Cuota mensual: ${formatMoney(mortgage)}
Interés total: ${formatMoney(interest)}
`;

  document.getElementById('cta').href =
    "https://wa.me/593XXXXXXXXX?text=" + encodeURIComponent(msg);
}

const monthly = document.getElementById('monthly');
const downEl = document.getElementById('down');
const loanEl = document.getElementById('loan');
const mortgageEl = document.getElementById('mortgage');
const interestEl = document.getElementById('interest');
const circle = document.getElementById('circle');

</script>

</body>
</html>
