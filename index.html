<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Financiamiento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fb;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}

.result-box, .form-box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.result-box {
  text-align: center;
}

.circle {
  width: 200px;
  height: 200px;
  margin: auto;
  border-radius: 50%;
  background: conic-gradient(#e5e7eb 0%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.inner {
  background: white;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.inner span {
  font-size: 32px;
  font-weight: bold;
}

.breakdown {
  margin-top: 20px;
  text-align: left;
}

.breakdown p {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.grid {
  display: grid;
  gap: 12px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  margin-top: 15px;
  padding: 12px;
  border: none;
  background: #0f172a;
  color: white;
  border-radius: 10px;
  width: 100%;
  cursor: pointer;
}

.cta {
  margin-top: 15px;
  display: block;
  padding: 12px;
  background: #25D366;
  color: white;
  text-align: center;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <!-- RESULTADO -->
  <div class="result-box">
    <h2>Pago mensual</h2>

    <div class="circle">
      <div class="inner">
        <span id="monthly">$0</span>
        <p>Mensual</p>
      </div>
    </div>

    <div class="breakdown">
      <p><span style="color:#ef476f;">● Entrada</span><span id="down">$0</span></p>
      <p><span style="color:#118ab2;">● Monto financiado</span><span id="loan">$0</span></p>
      <p><span style="color:#ffd166;">● Cuota mensual</span><span id="mortgage">$0</span></p>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-box">
    <h2>Simulación</h2>

    <div class="grid">
      <input type="number" id="price" placeholder="Valor del lote ($)">
      <input type="number" id="downPercent" value="30" placeholder="Entrada (%)">
      <input type="number" id="rate" value="8.5" placeholder="Tasa anual (%)">
      <input type="number" id="years" placeholder="Años">
    </div>

    <button onclick="calculate()">Calcular</button>

    <a id="cta" class="cta" target="_blank">
      Solicitar información
    </a>
  </div>

</div>

<script>

function formatMoney(value) {
  return "$" + value.toLocaleString("en-US", {
    minimumFractionDigits: 0,
    maximumFractionDigits: 0
  });
}

function calculate() {

  let price = parseFloat(document.getElementById('price').value) || 0;
  let downPercent = parseFloat(document.getElementById('downPercent').value) || 30;
  let rateAnnual = parseFloat(document.getElementById('rate').value) || 8.5;
  let years = parseFloat(document.getElementById('years').value) || 0;

  let down = price * (downPercent / 100);
  let loan = price - down;

  let rate = (rateAnnual / 100) / 12;
  let payments = years * 12;

  let mortgage = (loan * rate) / (1 - Math.pow(1 + rate, -payments));
  if (!isFinite(mortgage)) mortgage = 0;

  let total = mortgage;

  // Mostrar valores
  document.getElementById('monthly').innerText = formatMoney(total);
  document.getElementById('down').innerText = formatMoney(down);
  document.getElementById('loan').innerText = formatMoney(loan);
  document.getElementById('mortgage').innerText = formatMoney(mortgage);

  // Rueda con 3 colores (entrada, préstamo, cuota indicador)
  let entradaPercent = (down / price) * 100 || 0;
  let loanPercent = (loan / price) * 100 || 0;
  let cuotaPercent = Math.min((mortgage / 1000) * 20, 20);

  document.querySelector('.circle').style.background = `
    conic-gradient(
      #ef476f 0% ${entradaPercent}%,
      #118ab2 ${entradaPercent}% ${entradaPercent + loanPercent}%,
      #ffd166 ${entradaPercent + loanPercent}% ${entradaPercent + loanPercent + cuotaPercent}%,
      #e5e7eb ${entradaPercent + loanPercent + cuotaPercent}% 100%
    )
  `;

  // WhatsApp con datos completos
  let message = `
Hola, vi la simulación y quiero información:

Valor del lote: ${formatMoney(price)}
Entrada: ${downPercent}% (${formatMoney(down)})
Monto financiado: ${formatMoney(loan)}

Plazo: ${years} años
Tasa: ${rateAnnual}%

Cuota mensual estimada: ${formatMoney(total)}
`;

  let link = "https://wa.me/593987852475?text=" + encodeURIComponent(message);
  document.getElementById('cta').href = link;
}

</script>

</body>
</html>
